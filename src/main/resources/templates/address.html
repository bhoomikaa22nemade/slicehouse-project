<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">

<head>

<title>My Addresses | SliceHouse</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">My Addresses</h2>

<a th:href="@{/address/add}" class="btn btn-primary mb-3">
Add New Address
</a>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Area</th>
<th>City</th>
<th>State</th>
<th>Pincode</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="addr : ${addresses}">

<td th:text="${addr.id}"></td>

<td th:text="${addr.name}"></td>

<td th:text="${addr.area}"></td>

<td th:text="${addr.city}"></td>

<td th:text="${addr.state}"></td>

<td th:text="${addr.pincode}"></td>

<td>

<form th:action="@{/address/delete/{id}(id=${addr.id})}" method="post">

<button class="btn btn-danger btn-sm"
onclick="return confirm('Delete this address?')">
Delete
</button>

</form>

</td>

</tr>

<tr th:if="${#lists.isEmpty(addresses)}">
<td colspan="7" class="text-center">No addresses found</td>
</tr>

</tbody>

</table>

</div>

</body>

</html>
