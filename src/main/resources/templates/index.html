<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">

<head>
    <style>

        /* 🔥 CATEGORY SECTION */
        .category-section {
            padding: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            text-align: center;
        }

        .category-section h2 {
            color: #8b0000;
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* 🔥 CONTAINER */
        .category-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 🔥 CARD */
        .category-card {
            background: black;
            padding: 15px;
            border-radius: 20px;
            width: 220px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .category-card:hover {
            transform: translateY(-8px);
        }

        /* 🔥 IMAGE */
        .category-card img {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
        }

        /* 🔥 TEXT */
        .category-card h3 {
            color: #fff;
            margin-top: 10px;
        }

        .category-card p {
            color: #555;
            font-size: 13px;
        }

    </style>
</head>

<body>

<div layout:fragment="content">

    <!-- ================= HOME SECTION ================= -->
    <div class="home-section">
        <h1>Welcome to SliceHouse</h1>
        <p>Where every slice is a piece of happiness.</p>

        <div sec:authorize="isAnonymous()">
            <p style="color:#888;margin:15px 0;"></p>
        </div>
    </div>

    <!-- ================= CATEGORY SECTION ================= -->
    <section class="category-section">

        <h2>Categories</h2>

        <!-- No data -->
        <p th:if="${#lists.isEmpty(categories)}" style="color:white;">
            No categories available
        </p>

        <!-- Cards -->
        <div th:if="${!#lists.isEmpty(categories)}" class="category-container">

            <div th:each="cat : ${categories}" class="category-card">

                <!-- IMAGE -->
                <img th:src="${cat.image}"
                     alt="Category Image"
                     onerror="this.src='https://picsum.photos/300';">

                <!-- NAME -->
                <h3 th:text="${cat.categoryName}"></h3>

                <!-- DESCRIPTION -->
                <p th:text="${cat.description}"></p>

            </div>

        </div>

    </section>

    <!-- ================= PIZZA SECTION ================= -->
    <h2 class="section-title">Our Pizzas</h2>

    <div class="menu-grid">

        <a th:href="@{/cheese}" class="menu-link">
            <div class="menu-card">
                <img th:src="@{/images/cheezepizza.png}">
                <h3>Cheese Pizza</h3>
            </div>
        </a>

        <a th:href="@{/pepperoni}" class="menu-link">
            <div class="menu-card">
                <img th:src="@{/images/pepperoni.png}">
                <h3>Pepperoni Pizza</h3>
            </div>
        </a>

        <a th:href="@{/vegie}" class="menu-link">
            <div class="menu-card">
                <img th:src="@{/images/vegie.png}">
                <h3>Veggie Pizza</h3>
            </div>
        </a>

        <a th:href="@{/mania}" class="menu-link">
            <div class="menu-card">
                <img th:src="@{/images/margherita.png}">
                <h3>Pizza Mania</h3>
            </div>
        </a>

    </div>

    <!-- ================= AD SECTION ================= -->
    <section class="advertisement">

        <div class="ad-banner">

            <img th:src="@{/images/banner.png}" alt="Beverage Advertisement">

            <div class="coming-marquee">
                <span>🍹 BEVERAGES COMING SOON • REFRESHING DRINKS ARRIVING SOON • STAY TUNED 🍹</span>
            </div>

        </div>

    </section>

</div>

</body>
</html>
