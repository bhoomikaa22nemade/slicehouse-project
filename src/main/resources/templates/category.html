<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category Management</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        img {
            border-radius: 10px;
            object-fit: cover;
        }

        form input, button {
            margin: 5px;
            padding: 8px;
        }
    </style>
</head>

<body>

<h2>Category Management</h2>

<!-- ================= FORM ================= -->
<form th:action="${category.categoryId != 0} ? @{/category/update} : @{/category/save}" 
      method="post" 
      enctype="multipart/form-data">

    <input type="hidden" name="categoryId" th:value="${category.categoryId}">

    <input type="text" name="categoryName" placeholder="Category Name"
           th:value="${category.categoryName}" required>

    <input type="text" name="description" placeholder="Description"
           th:value="${category.description}" required>

    <!-- 🔥 FILE UPLOAD -->
    <input type="file" name="file">

    <button type="submit"
        th:text="${category.categoryId != 0 ? 'Update' : 'Add'}">
    </button>

</form>

<hr>

<!-- ================= TABLE ================= -->
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Image</th>
        <th>Action</th>
    </tr>

    <tr th:each="cat : ${categories}">
        <td th:text="${cat.categoryId}"></td>
        <td th:text="${cat.categoryName}"></td>
        <td th:text="${cat.description}"></td>

        <!-- ✅ IMAGE FIXED -->
        <td>
         <img th:src="${cat.image}" width="100" height="100"
     style="border-radius:10px; object-fit:cover;"
     onerror="this.src='https://picsum.photos/300';" />
        </td>

        <td>
            <a th:href="@{/category/edit/{id}(id=${cat.categoryId})}">Edit</a> |
            <a th:href="@{/category/delete/{id}(id=${cat.categoryId})}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
