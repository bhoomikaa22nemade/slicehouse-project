<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title th:text="${pizza.name} + ' | SliceHouse'">Pizza Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

.page-content{
    padding:40px;
    background:#f5b400;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#111;
    color:#fff;
    padding:40px;
    border-radius:24px;
}

.top-section{
    display:flex;
    gap:50px;
    margin-bottom:40px;
}

/* ✅ IMAGE FIXED */
.top-section img{
    width:420px;
    height:420px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.6);
}

h1{
    color:#ffc107;
    font-size:42px;
}

.desc{
    font-size:15px;
    line-height:1.8;
}

.price{
    font-size:28px;
    font-weight:600;
    color:#ffcc00;
    margin:15px 0;
}

select,button{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
}

button{
    background:#7b0000;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

.section{
    margin-top:40px;
}

.section h2{
    color:#ffc107;
}

.coupon{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:block;
}

.coupon span{
    color:#ffcc00;
    font-weight:600;
}

/* ✅ RESPONSIVE */
@media(max-width:900px){
    .top-section{
        flex-direction:column;
    }

    .top-section img{
        width:100%;
        height:350px;
    }
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page-content">

<div class="container">

<div class="top-section">


<!-- ✅ FINAL IMAGE FIX -->
<img th:src="${pizza.productImage}" alt="Pizza Image"/>

<div>

    <h1 th:text="${pizza.name}">Pizza Name</h1>

    <p class="desc" th:text="${pizza.description}"></p>

    <p><b>Ingredients:</b></p>
    <p th:text="${pizza.smallDescription}"></p>

    <!-- CART FORM -->
    <form id="cartForm" th:action="@{/cart/add}" method="post">

        <input type="hidden" name="pizzaId" th:value="${pizza.id}">
        <input type="hidden" id="couponInput" name="coupon">

        <!-- SIZE -->
        <select name="size" id="size" onchange="updatePrice()">

            <option th:value="'Regular'"
                    th:data-price="${pizza.sellingPrice}"
                    th:text="'Regular - ₹' + ${pizza.sellingPrice}">
            </option>

            <option th:value="'Medium'"
                    th:data-price="${pizza.sellingPrice + 100}"
                    th:text="'Medium - ₹' + (${pizza.sellingPrice + 100})">
            </option>

            <option th:value="'Large'"
                    th:data-price="${pizza.sellingPrice + 200}"
                    th:text="'Large - ₹' + (${pizza.sellingPrice + 200})">
            </option>

        </select>

        <!-- PRICE -->
        <div class="price">
            ₹ <span id="priceDisplay" th:text="${pizza.sellingPrice}"></span>
        </div>

        <!-- QUANTITY -->
        <select name="quantity">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>

        <button type="submit">Add to Cart</button>

    </form>

</div>


</div>

<!-- COUPONS -->

<div class="section">

<h2>Offers & Coupons</h2>

<label class="coupon">
<input type="radio" name="couponRadio" value="CHEESE20">
<span>CHEESE20</span> – 20% OFF above ₹399
</label>

<label class="coupon">
<input type="radio" name="couponRadio" value="SLICE50">
<span>SLICE50</span> – ₹50 OFF first order
</label>

<label class="coupon">
<input type="radio" name="couponRadio" value="FREEDLV">
<span>FREEDLV</span> – Free Delivery above ₹299
</label>

</div>

<!-- LOVE SECTION -->

<div class="section">

<h2>Why Customers Love It ❤️</h2>

<p class="desc">
Customers love this pizza for its rich cheese layers,
soft crust and consistent taste. Perfect for parties
and midnight cravings!
</p>

</div>

</div>

</div>

</div>

<script>

function updatePrice(){
    let select=document.getElementById("size");
    let price=select.options[select.selectedIndex].dataset.price;
    document.getElementById("priceDisplay").innerText=price;
}

// coupon capture
document.getElementById("cartForm").addEventListener("submit", function(){
    let coupon=document.querySelector('input[name="couponRadio"]:checked');
    if(coupon){
        document.getElementById("couponInput").value=coupon.value;
    }
});

</script>

</body>
</html>
