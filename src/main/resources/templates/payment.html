<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout | SliceHouse</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

* { box-sizing: border-box; }

body{
margin:0;
padding:20px;
font-family:'Poppins',sans-serif;
background:#f5b400;
}

.checkout-container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.left-section,.right-section{
background:#111;
color:#fff;
border-radius:24px;
}

.left-section{ padding:20px; }

.right-section{
padding:16px;
height:fit-content;
}

h1{
color:#ffc107;
margin:0 0 12px;
font-size:22px;
}

h2{
color:#ffc107;
font-size:16px;
border-bottom:2px solid #333;
padding-bottom:6px;
}

.section{
margin-bottom:16px;
padding:14px;
background:#1a1a1a;
border-radius:12px;
border:1px solid #333;
}

.form-group{ margin-bottom:10px; }

.form-group label{
display:block;
margin-bottom:4px;
font-size:13px;
}

.form-group input, textarea{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #444;
background:#222;
color:#fff;
}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* PAYMENT */

.payment-method-selector{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.payment-option input{ display:none; }

.payment-option label{
display:block;
padding:10px;
background:#222;
border:2px solid #444;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.payment-option input:checked + label{
background:#1a4d2e;
border-color:#00ff00;
color:#00ff00;
}

/* ORDER SUMMARY */

.order-summary{
background:#1a1a1a;
padding:12px;
border-radius:12px;
border:1px solid #333;
margin-bottom:10px;
}

.summary-item{
display:flex;
justify-content:space-between;
font-size:13px;
margin:5px 0;
}

.summary-item.total{
font-size:15px;
font-weight:600;
color:#ffcc00;
border-top:2px solid #333;
padding-top:6px;
}

/* BUTTON */

.checkout-btn{
width:100%;
padding:10px;
background:#00aa00;
border:none;
border-radius:8px;
font-size:14px;
color:#fff;
cursor:pointer;
}

.checkout-btn:hover{ background:#00dd00; }

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(4px);
}

.modal-content{
background:#111;
color:#fff;
margin:15% auto;
padding:25px;
border-radius:16px;
width:320px;
text-align:center;
}

.modal-content h2{ color:#ffc107; }

.modal-content button{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#00aa00;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="checkout-container">

<!-- LEFT SECTION -->

<div class="left-section">

<h1>📦 Checkout</h1>

<div class="section">

<h2>📍 Delivery Details</h2>

<div class="form-group">
<label>Full Name</label>
<input id="fullName">
</div>

<div class="form-row">

<div class="form-group">
<label>Phone</label>
<input id="phone">
</div>

<div class="form-group">
<label>Email</label>
<input id="email">
</div>

</div>

<div class="form-group">
<label>Address</label>
<input id="address">
</div>

<div class="form-row">

<div class="form-group">
<label>City</label>
<input id="city">
</div>

<div class="form-group">
<label>Postal Code</label>
<input id="postal">
</div>

</div>

</div>

<!-- PAYMENT METHOD -->

<div class="section">

<h2>💳 Payment Method</h2>

<div class="payment-method-selector">

<div class="payment-option">
<input type="radio" id="upiOpt" name="paymentMethod" checked onclick="showPayment('upi')">
<label for="upiOpt">📱 UPI</label>
</div>

<div class="payment-option">
<input type="radio" id="codOpt" name="paymentMethod" onclick="showPayment('cod')">
<label for="codOpt">💵 Cash on Delivery</label>
</div>

</div>

<!-- UPI -->

<div id="upiBox">

<div class="form-group">
<label>UPI ID</label>
<input placeholder="example@upi">
</div>

</div>

<!-- COD -->

<div id="codBox" style="display:none;">
<p style="font-size:13px;color:#ccc;">
Pay in cash when your order is delivered.
</p>
</div>

</div>

</div>

<!-- RIGHT SECTION -->

<div class="right-section">

<h1>📋 Your Order</h1>

<div class="order-summary" id="orderDetailsDisplay"></div>

<button class="checkout-btn" onclick="placeOrder()">Place Order</button>

</div>

</div>

<!-- ORDER SUCCESS MODAL -->

<div id="orderModal" class="modal">

<div class="modal-content">

<div style="font-size:40px;">✅</div>

<h2>Order Placed!</h2>

<p>Your delicious order is on its way 🚀</p>

<button onclick="goToOrder()">Continue</button>
<script>
function goToOrder() {
    window.location.href = "/order/place";
}
</script>

</div>

</div>

<script>

function showPayment(type){

document.getElementById("upiBox").style.display =
type === "upi" ? "block" : "none";

document.getElementById("codBox").style.display =
type === "cod" ? "block" : "none";

}

function loadOrderDetails(){

const item = localStorage.getItem("cartItem") || "Pizza";
const price = localStorage.getItem("cartPrice") || 179;
const qty = localStorage.getItem("cartQty") || 1;

const total = price * qty;

document.getElementById("orderDetailsDisplay").innerHTML = `
<div class="summary-item"><span>${item}</span><span>₹${price} × ${qty}</span></div>
<div class="summary-item"><span>Delivery</span><span>Free</span></div>
<div class="summary-item total"><span>Total</span><span>₹${total}</span></div>
`;

}

function placeOrder(){

document.getElementById("orderModal").style.display="block";

localStorage.clear();

}

function closeModal(){

document.getElementById("orderModal").style.display="none";

window.location.href="/";

}

loadOrderDetails();

</script>

</body>
</html>
