<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
<meta charset="UTF-8">
<title>Cheesy Pizzas | SliceHouse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f5b400;
}

.page-content{
    padding:40px;
}

h1{
    text-align:center;
    color:#7b0000;
    margin-bottom:40px;
    font-size:38px;
}

.pizza-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* CARD */

.pizza-card{
    background:#111;
    border-radius:20px;
    padding:18px;
    color:white;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    transition:0.3s;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    height:100%;
    min-height:420px;
}

.pizza-card:hover{
    transform:translateY(-8px);
}

.pizza-card img{
    width:100%;
    height:200px;
    object-fit:contain;
    background:black;
    border-radius:12px;
    margin-bottom:15px;
}

.pizza-card h3{
    margin:10px 0;
    color:#ffc107;
    font-size:18px;
}

.pizza-card p{
    font-size:14px;
    line-height:1.6;
    margin-bottom:10px;
}

.ingredients{
    font-size:13px;
    opacity:0.9;
}

.price{
    font-weight:600;
    color:#ffcc00;
    font-size:16px;
    margin-top:auto;
}

/* Responsive */

@media (max-width:1100px){
    .pizza-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media (max-width:600px){
    .pizza-grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div layout:fragment="content">

<div class="page-content">

<h1>Cheesy Pizzas</h1>

<div class="pizza-grid">

<div th:each="pizza : ${cheesePizzas}">

<a th:href="@{/pizza/{id}(id=${pizza.id})}" style="text-decoration:none;color:inherit;">

<div class="pizza-card">

<!-- IMAGE FROM DATABASE -->
<img th:src="${pizza.productImage}"
     style="width:100%; height:200px; object-fit:cover;">
<h3 th:text="${pizza.name}"></h3>

<p th:text="${pizza.description}"></p>

<p class="ingredients">
<b>Ingredients:</b>
<span th:text="${pizza.smallDescription}"></span>
</p>

<p class="price">
₹<span th:text="${pizza.sellingPrice}"></span>
</p>

</div>

</a>

</div>

</div>

</div>

</div>

</body>

</html>
