<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        .navbar {
            background: #333;
            padding: 15px;
            color: white;
        }

        .navbar h2 {
            margin: 0;
        }

        .sidebar {
            width: 220px;
            background: #222;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 70px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar .menu {
            flex-grow: 1;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #444;
        }

        .sidebar .logout {
            margin-bottom: 20px;
            text-align: center;
        }

        .sidebar .logout a {
            background: #dc3545;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
        }

        .sidebar .logout a:hover {
            background: #c82333;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        form {
            background: #222;
            padding: 20px;
            width: 30%;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin: 10px 0;
        }

        input[type="text"], input[type="password"] {
            width: 95%;
            padding: 8px;
            margin-top: 4px;
        }

        button {
            padding: 10px 15px;
            background: #28a745;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #218838;
        }

        h2{
            text-align: center;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>w</h2>
</div>

<div class="sidebar">
    <div class="menu">
        <a th:href="@{/admin/users}">Manage Users</a>
        <a th:href="@{/admin/pizzas}">Manage Pizzas</a>
        <a th:href="@{/admin/orders}">Manage Orders</a>
        <a th:href="@{/admin/cart}">Manage Cart</a>
        <a th:href="@{/admin/addresses}">Manage Address</a>
    </div>

    <form th:action="@{/logout}" method="post" class="logout">
    <button type="submit" class="btn btn-danger">Logout</button>
</form>
</div>

<!-- This is the area that child pages will fill -->
<div class="content" layout:fragment="content">
    <!-- Default content (optional) -->
    <h2>Welcome to Admin Panel</h2>
</div>

</body>
</html>
