<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

<div class="container-fluid">

<div class="head mt-3">
<h1>Pizza Management</h1>

<a th:href="@{/admin/pizzas/add}" class="btn btn-primary mb-3">
Add New Pizza
</a>

</div>

<table class="table table-striped">

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Category</th>
<th>Selling Price</th>
<th>Discounted Price</th>
<th>Image</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr th:each="pizza : ${pizzas}">

<td th:text="${pizza.id}"></td>
<td th:text="${pizza.name}"></td>
<td th:text="${pizza.category}"></td>
<td th:text="${pizza.sellingPrice}"></td>
<td th:text="${pizza.discountedPrice}"></td>

<td>
<img th:src="@{/images/{img}(img=${pizza.productImage})}" width="80">
</td>

<td>
<a th:href="@{/admin/pizzas/update/{id}(id=${pizza.id})}" class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{/admin/pizzas/delete/{id}(id=${pizza.id})}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
