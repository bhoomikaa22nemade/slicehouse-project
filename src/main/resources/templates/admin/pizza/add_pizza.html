<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h4 class="mb-0">Add New Pizza</h4>
</div>

<div class="card-body">

<form th:action="@{/admin/pizzas/add}"
      method="post"
      th:object="${pizza}"
      enctype="multipart/form-data">

<!-- Pizza Name -->

<div class="mb-3">
<label class="form-label">Pizza Name</label>

<input type="text"
       class="form-control"
       th:field="*{name}"
       placeholder="Enter pizza name"
       required>
</div>


<!-- Category -->

<div class="mb-3">

<label class="form-label">Category</label>

<select class="form-select"
        th:field="*{category}"
        required>

<option value="">Select Category</option>

<option th:each="cat : ${categories}"
        th:value="${cat}"
        th:text="${cat}">
</option>

</select>

</div>


<!-- Short Description -->

<div class="mb-3">

<label class="form-label">Short Description</label>

<input type="text"
       class="form-control"
       th:field="*{smallDescription}"
       placeholder="Short description">

</div>


<!-- Full Description -->

<div class="mb-3">

<label class="form-label">Description</label>

<textarea class="form-control"
          rows="4"
          th:field="*{description}"
          placeholder="Enter pizza description">
</textarea>

</div>


<!-- Selling Price -->

<div class="mb-3">

<label class="form-label">Selling Price</label>

<input type="number"
       class="form-control"
       th:field="*{sellingPrice}"
       placeholder="Enter selling price"
       required>

</div>


<!-- Discounted Price -->

<div class="mb-3">

<label class="form-label">Discounted Price</label>

<input type="number"
       class="form-control"
       th:field="*{discountedPrice}"
       placeholder="Enter discounted price">

</div>


<!-- Image Upload -->

<div class="mb-3">

<label class="form-label">Pizza Image</label>

<input type="file"
       class="form-control"
       name="imageFile">

</div>


<!-- Buttons -->

<button type="submit" class="btn btn-success">
Add Pizza
</button>

<a th:href="@{/admin/pizzas}"
   class="btn btn-secondary ms-2">
Cancel
</a>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
