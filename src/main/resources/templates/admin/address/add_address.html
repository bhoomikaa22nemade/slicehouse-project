<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

<div class="container mt-4">

<h2 class="mb-4">Add New Address</h2>

<form th:action="@{/admin/addresses/add}" 
      method="post" 
      th:object="${address}">

<!-- USER -->
<div class="mb-3">

<label class="form-label">User</label>

<select class="form-select" th:field="*{user.id}" required>

<option value="">Select User</option>

<option th:each="u : ${users}"
        th:value="${u.id}"
        th:text="${u.username}">
</option>

</select>

</div>

<!-- NAME -->
<div class="mb-3">

<label class="form-label">Name</label>

<input type="text"
       class="form-control"
       th:field="*{name}"
       placeholder="Enter address name"
       required>

</div>

<!-- AREA -->
<div class="mb-3">

<label class="form-label">Area</label>

<input type="text"
       class="form-control"
       th:field="*{area}"
       placeholder="Enter area"
       required>

</div>

<!-- CITY -->
<div class="mb-3">

<label class="form-label">City</label>

<input type="text"
       class="form-control"
       th:field="*{city}"
       placeholder="Enter city"
       required>

</div>

<!-- STATE -->
<div class="mb-3">

<label class="form-label">State</label>

<select class="form-select" th:field="*{state}" required>

<option value="">Select State</option>

<option th:each="s : ${T(com.example.sliceeehouse.model.enums.State).values()}"
        th:value="${s}"
        th:text="${s}">
</option>

</select>

</div>

<!-- PINCODE -->
<div class="mb-3">

<label class="form-label">Pincode</label>

<input type="number"
       class="form-control"
       th:field="*{pincode}"
       placeholder="Enter pincode"
       required>

</div>

<!-- BUTTONS -->
<button type="submit" class="btn btn-primary">
Add Address
</button>

<a th:href="@{/admin/addresses}" 
   class="btn btn-secondary ms-2">
Cancel
</a>

</form>

</div>

</div>

</body>
</html>
