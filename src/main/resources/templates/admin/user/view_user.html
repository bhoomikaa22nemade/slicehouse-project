<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

<div class="container-fluid">

    <div class="head mt-3 d-flex justify-content-between align-items-center">
        <h1>User Management</h1>

        <a th:href="@{/admin/users/add}" class="btn btn-primary">
            Add New User
        </a>
    </div>

    <div class="row mt-3">
        <div class="col-12">

            <table class="table table-striped table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th width="200">Actions</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="user : ${users}">

                        <td th:text="${user.id}"></td>

                        <td th:text="${user.username}"></td>

                        <td th:text="${user.role}"></td>

                        <td>

                            <a th:href="@{/admin/users/update/{id}(id=${user.id})}"
                               class="btn btn-warning btn-sm">
                               Edit
                            </a>

                            <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this user?');">
                               Delete
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</div>

</body>
</html>
