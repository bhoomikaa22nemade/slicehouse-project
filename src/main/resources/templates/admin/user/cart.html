
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Your Cart | SliceHouse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:40px;
font-family:'Poppins',sans-serif;
background:#f5b400;
}

.cart-container{
max-width:900px;
margin:auto;
background:#111;
color:#fff;
padding:40px;
border-radius:24px;
}

h1{
color:#ffc107;
text-align:center;
margin-bottom:30px;
}

.cart-items-section{
background:#1a1a1a;
padding:20px;
border-radius:12px;
margin-bottom:30px;
border:1px solid #333;
}

.cart-item{
background:#222;
margin-bottom:15px;
padding:20px;
border-radius:10px;
border:1px solid #333;
display:grid;
grid-template-columns:1fr 1fr auto;
gap:20px;
align-items:center;
}

.item-info p{
margin:6px 0;
color:#ddd;
}

.item-name{
font-size:18px;
font-weight:600;
color:#ffc107;
margin-bottom:8px;
}

.item-total{
text-align:right;
}

.price{
font-size:24px;
color:#ffcc00;
font-weight:600;
}

.delete-btn{
background:#b30000;
padding:10px 15px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.summary-section{
background:#1a1a1a;
padding:20px;
border-radius:12px;
border:1px solid #333;
margin-bottom:20px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:12px 0;
}

.summary-row.total{
font-size:24px;
font-weight:600;
color:#ffcc00;
border-top:2px solid #333;
padding-top:12px;
}

.btn{
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.btn-checkout{
background:#00aa00;
color:#fff;
}

.empty{
text-align:center;
padding:60px 20px;
}

.empty a{
padding:12px 30px;
background:#ffc107;
color:#000;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

</style>
</head>

<body>

<div class="cart-container">

<h1>🛒 Your Cart</h1>

<!-- EMPTY CART -->

<div th:if="${#lists.isEmpty(cartItems)}" class="empty">
<p>Your cart is empty</p>
<a href="/">← Continue Shopping</a>
</div>

<!-- CART ITEMS -->

<div th:if="${!#lists.isEmpty(cartItems)}">

<div class="cart-items-section">

<h2 style="color:#ffc107;">Items in Cart</h2>

<div th:each="item : ${cartItems}" class="cart-item">

<div class="item-info">

<div class="item-name" th:text="${item.pizza.name}"></div>

<p><b>Size:</b> <span th:text="${item.size}"></span></p>

<p><b>Quantity:</b> <span th:text="${item.quantity}"></span></p>

<p><b>Coupon:</b>
<span th:text="${item.coupon != null ? item.coupon : 'None'}"></span>
</p>

</div>

<div style="text-align:center">

<p style="color:#999;">Unit Price</p>

<p style="font-size:20px;color:#ffc107;font-weight:600;">
₹<span th:text="${item.pizza.sellingPrice}"></span>
</p>

</div>

<div class="item-total">

<div class="price">
₹<span th:text="${item.pizza.sellingPrice * item.quantity}"></span>
</div>

<a th:href="@{/cart/delete/{id}(id=${item.id})}">
<button class="delete-btn">Remove</button>
</a>

</div>

</div>

</div>

<!-- SUMMARY -->

<div class="summary-section">

<div class="summary-row">
<span>Subtotal</span>
<span>Calculated at checkout</span>
</div>

<div class="summary-row">
<span>Delivery Fee</span>
<span>Free</span>
</div>

<div class="summary-section">

<div class="summary-row total">
<span>Total</span>
<span>See Checkout</span>
</div>

<form action="/payment" method="get">
<button class="btn btn-checkout">
Proceed to Checkout
</button>
</form>

</div>

</form>

</div>
<!-- <form action="/payment" method="get">
    <button class="btn btn-checkout">
        Proceed to Payment
    </button>
</form> -->

</div>

<!-- <form action="/payment" method="get"> -->


</div>


</div>

</div>

</body>
</html>
