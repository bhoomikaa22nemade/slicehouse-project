<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

    <div class="container mt-4">
        <h1>Order Management</h1>

        <a th:href="@{/admin/orders/add}" class="btn btn-primary mb-3">Add New Order</a>

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Customer Name</th>
                <th>Address</th>
                <th>Quantity</th>
                <th>Total Price</th>
                <th>Order Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.pizza.name}"></td>
              <td th:text="${order.address != null ? order.address.name : 'N/A'}"></td>
              <td th:text="${order.address != null ? order.address.city : 'N/A'}"></td>
                <td th:text="${order.quantity}"></td>
                <td th:text="${order.quantity * order.pizza.discountedPrice}"></td>
                <td th:text="${order.orderAt}"></td>
                <!-- <td th:text="${order.status}"></td> -->
                <td>
                    <a th:href="@{/admin/orders/update/{id}(id=${order.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/admin/orders/delete/{id}(id=${order.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure you want to delete this order?')">Delete</a>
                </td>
            </tr>

            <tr th:if="${orders.isEmpty()}">
                <td colspan="9" class="text-center">No orders found</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
