<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin}">

<body>

<div layout:fragment="content">

    <div class="container mt-4">
        <h2>Add New Order</h2>

        <form th:action="@{/admin/orders/add}" th:object="${order}" method="post">

            <!-- User -->
            <div class="mb-3">
                <label class="form-label">User</label>
                <select th:field="*{user.id}" class="form-select">
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
                </select>
            </div>

            <!-- Product -->
            <div class="mb-3">
                <label class="form-label">Pizza</label>
                <select th:field="*{pizza.id}" class="form-select">
                    <option th:each="pizza : ${pizzas}" th:value="${pizza.id}" th:text="${pizza.name}"></option>
                </select>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label">Address</label>
                <select th:field="*{address.id}" class="form-select">
                    <option th:each="address : ${addresses}" th:value="${address.id}" th:text="${address.city}"></option>
                </select>
            </div>

            <!-- Quantity -->
            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" th:field="*{quantity}" class="form-control" min="1">
            </div>

            <!-- Buttons -->
            <button type="submit" class="btn btn-success">Save</button>
            <a th:href="@{/admin/orders}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>

</div>

</body>
</html>
